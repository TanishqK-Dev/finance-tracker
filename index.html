<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow Pro | Finance & Business Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="personal-mode">

    <div class="container">
        <h1>💰 CashFlow Pro</h1>

        <div class="mode-switcher">
            <span id="mode-label">Personal Mode</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider round"></span>
            </label>
        </div>
        
        <div class="balance-container">
            <h3>Current Balance</h3>
            <h1 id="balance">$0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn export-btn" id="export-btn">📥 Export to CSV (Sheets)</button>
        </div>

        <h3>Transaction History</h3>
        <ul id="list" class="list"></ul>

        <h3>New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g. Client Payment, Groceries..." required />
            </div>
            
            <div class="form-control">
                <label for="category">Category</label>
                <select id="category"></select>
            </div>

            <div class="form-control">
                <label for="amount">Amount (Negative = Exp, Positive = Inc)</label>
                <input type="number" id="amount" placeholder="-10.00" step="0.01" required />
            </div>

            <button class="btn add-btn">Add Transaction</button>
            <button type="button" class="btn reset-btn" id="reset-btn">Clear Mode Data</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
