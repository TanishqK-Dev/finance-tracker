<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashFlow | Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💰 CashFlow</h1>
        
        <div class="balance-container">
            <h3>Your Balance</h3>
            <h1 id="balance">$0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus" class="money plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus" class="money minus">-$0.00</p>
            </div>
        </div>

        <h3>History</h3>
        <ul id="list" class="list"></ul>

        <h3>Add New Transaction</h3>
        <form id="form">
            <div class="form-control">
                <label for="text">Description</label>
                <input type="text" id="text" placeholder="e.g. Lunch, Salary..." required />
            </div>
            
            <div class="form-control">
                <label for="category">Category</label>
                <select id="category">
                    <option value="Salary">💰 Salary</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Rent">🏠 Rent</option>
                    <option value="Fun">🎮 Entertainment</option>
                    <option value="Other">📦 Other</option>
                </select>
            </div>

            <div class="form-control">
                <label for="amount">Amount (Negative = Expense, Positive = Income)</label>
                <input type="number" id="amount" placeholder="-10 or 500" step="0.01" required />
            </div>
            <button class="btn reset-btn" id="reset-btn" style="background-color: #777; margin-top: 0;">Clear All Data</button>

            <button class="btn">Add Transaction</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
>
